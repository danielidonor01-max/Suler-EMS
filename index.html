<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suler EMS</title>
  
  <!-- Fonts: Inter & Material Symbols -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,0,0&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
              "on-secondary": "#ffffff",
              "surface-dim": "#d9d9e5",
              "tertiary": "#943700",
              "error-container": "#ffdad6",
              "outline-variant": "#c3c6d7",
              "secondary-fixed-dim": "#c0c7d6",
              "on-tertiary": "#ffffff",
              "error": "#ba1a1a",
              "tertiary-container": "#bc4800",
              "primary-container": "#2563eb",
              "on-secondary-fixed-variant": "#404754",
              "tertiary-fixed": "#ffdbcd",
              "outline": "#737686",
              "inverse-surface": "#2e3039",
              "tertiary-fixed-dim": "#ffb596",
              "on-surface-variant": "#434655",
              "surface-container-low": "#f3f3fe",
              "on-background": "#191b23",
              "surface": "#faf8ff",
              "inverse-on-surface": "#f0f0fb",
              "surface-container-highest": "#e1e2ed",
              "on-tertiary-container": "#ffede6",
              "primary-fixed-dim": "#b4c5ff",
              "on-tertiary-fixed-variant": "#7d2d00",
              "on-primary-container": "#eeefff",
              "inverse-primary": "#b4c5ff",
              "secondary": "#585f6c",
              "on-secondary-fixed": "#151c27",
              "background": "#faf8ff",
              "surface-tint": "#0053db",
              "secondary-container": "#dce2f3",
              "on-secondary-container": "#5e6572",
              "secondary-fixed": "#dce2f3",
              "on-primary-fixed-variant": "#003ea8",
              "on-surface": "#191b23",
              "primary": "#004ac6",
              "surface-bright": "#faf8ff",
              "on-error-container": "#93000a",
              "surface-variant": "#e1e2ed",
              "surface-container-lowest": "#ffffff",
              "on-primary": "#ffffff",
              "surface-container": "#ededf9",
              "on-error": "#ffffff",
              "on-tertiary-fixed": "#360f00",
              "primary-fixed": "#dbe1ff",
              "on-primary-fixed": "#00174b",
              "surface-container-high": "#e7e7f3"
          },
          borderRadius: {
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "0.75rem",
              "full": "9999px"
          },
          spacing: {
              "lg": "24px",
              "xl": "32px",
              "2xl": "48px",
              "md": "16px",
              "3xl": "64px",
              "xs": "4px",
              "sm": "8px"
          },
          fontFamily: {
              "label-sm": ["Inter"],
              "h3": ["Inter"],
              "body-lg": ["Inter"],
              "body-md": ["Inter"],
              "button": ["Inter"],
              "h2": ["Inter"],
              "h1": ["Inter"]
          },
          fontSize: {
              "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
              "h3": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
              "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
              "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
              "button": ["14px", {"lineHeight": "20px", "fontWeight": "600"}],
              "h2": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
              "h1": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-family: 'Material Symbols Rounded', sans-serif !important;
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    
    /* Tailwind compatibility layer for CSS variables */
    @layer base {
      :root {
        --color-primary: #004ac6;
        --color-primary-container: #2563eb;
      }
    }
  </style>

  <!-- CSS -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/modules.css">
</head>
<body>

  <!-- Loading State overlay -->
  <div id="global-loader" class="global-loader hidden">
    <div class="spinner"></div>
  </div>

  <!-- AUTHENTICATION VIEW -->
  <div id="login-view" class="view-container">
    <div class="login-card">
      <div class="login-header">
        <h1>Suler EMS</h1>
        <p>Sign in to your account</p>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" value="super@suler.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" value="password123" required>
        </div>
        <div id="login-error" class="error-text hidden"></div>
        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
      </form>
    </div>
  </div>

  <!-- MAIN APP SHELL -->
  <div id="app-shell" class="view-container hidden">
    
    <!-- SideNavBar Component -->
    <aside id="sidebar" class="h-screen w-64 border-r fixed left-0 top-0 bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-800 z-50 overflow-y-auto transition-transform duration-300">
      <div class="flex flex-col h-full pt-4 pb-8">
        <!-- Branding -->
        <div class="px-6 mb-8 flex items-center gap-3">
          <div class="w-10 h-10 bg-primary-container rounded-lg flex items-center justify-center">
            <span class="material-symbols-outlined text-white" data-icon="corporate_fare">corporate_fare</span>
          </div>
          <div>
            <h2 class="text-lg font-black text-blue-600 leading-none">Suler EMS</h2>
            <span id="sidebar-role-label" class="text-label-sm text-secondary">System Portal</span>
          </div>
        </div>
        
        <!-- Navigation Links -->
        <nav id="sidebar-nav" class="sidebar-nav flex-1">
          <!-- Navigation injected by JS based on role -->
        </nav>
        
        <!-- Footer Links -->
        <div class="px-2 mt-auto border-t border-slate-100 pt-4">
          <button id="logout-btn" class="w-full flex items-center text-slate-600 dark:text-slate-400 px-4 py-3 border-l-4 border-transparent hover:bg-red-50 hover:text-red-600 dark:hover:bg-slate-800 transition-all font-sans text-sm font-semibold tracking-tight">
            <span class="material-symbols-outlined mr-3">logout</span>
            Logout
          </button>
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <div style="flex:1;display:flex;flex-direction:column;margin-left:var(--sidebar-width);">

      <!-- ════════════════════════════════
           GLOBAL TOPBAR
           ════════════════════════════════ -->
      <header id="global-topbar" style="
        height: var(--topbar-height);
        background: var(--color-surface);
        border-bottom: 1px solid var(--color-border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 var(--space-lg);
        position: sticky;
        top: 0;
        z-index: 40;
        box-shadow: var(--shadow-1);
        flex-shrink: 0;
      ">
        <!-- LEFT: Mobile menu + Page title -->
        <div style="display:flex;align-items:center;gap:var(--space-md);min-width:0;flex:1;">
          <button id="mobile-menu-btn" style="
            display:none;
            align-items:center;justify-content:center;
            width:36px;height:36px;
            border:none;background:none;cursor:pointer;
            border-radius:var(--radius-md);
            color:var(--color-text-secondary);
          ">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h2 id="global-page-title" style="
            font-size: var(--text-lg);
            font-weight: var(--font-semibold);
            color: var(--color-text-primary);
            white-space: nowrap;
            margin: 0;
            line-height: var(--topbar-height);
          ">Dashboard</h2>
        </div>

        <!-- CENTER: Search -->
        <div style="flex:1;max-width:360px;margin:0 var(--space-lg);">
          <div style="position:relative;">
            <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--color-text-muted);pointer-events:none;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </span>
            <input
              type="text"
              placeholder="Search anything..."
              style="
                width:100%;
                height:38px;
                background:var(--color-bg);
                border:1px solid var(--color-border);
                border-radius:var(--radius-full);
                padding:0 var(--space-md) 0 38px;
                font-size:var(--text-sm);
                font-family:var(--font-family);
                color:var(--color-text-primary);
                outline:none;
                transition:all 0.2s;
              "
              onfocus="this.style.borderColor='var(--color-primary)';this.style.boxShadow='0 0 0 3px rgba(37,99,235,0.1)'"
              onblur="this.style.borderColor='var(--color-border)';this.style.boxShadow='none'"
            />
          </div>
        </div>

        <!-- RIGHT: Role switcher + Notifications + User -->
        <div style="display:flex;align-items:center;gap:var(--space-sm);flex-shrink:0;">

          <!-- Role Switcher -->
          <div style="position:relative;" id="role-switcher-container">
            <button id="role-switcher-btn" style="
              display:inline-flex;align-items:center;gap:6px;
              height:34px;padding:0 var(--space-md) 0 var(--space-sm);
              background:var(--color-bg);
              border:1px solid var(--color-border);
              border-radius:var(--radius-full);
              font-family:var(--font-family);
              font-size:var(--text-xs);
              font-weight:var(--font-semibold);
              color:var(--color-primary);
              cursor:pointer;
              transition:all 0.15s;
              white-space:nowrap;
            "
            onmouseover="this.style.borderColor='var(--color-primary)';this.style.background='var(--color-primary-subtle)'"
            onmouseout="this.style.borderColor='var(--color-border)';this.style.background='var(--color-bg)'">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
              <span id="active-role-label" style="font-size:var(--text-xs);font-weight:var(--font-semibold);">Super Admin</span>
            </button>
            <div id="role-switcher-menu" style="
              position:absolute;right:0;top:calc(100% + 8px);
              background:var(--color-surface);
              border:1px solid var(--color-border);
              border-radius:var(--radius-lg);
              box-shadow:var(--shadow-3);
              min-width:200px;z-index:100;
              overflow:hidden;padding:var(--space-xs);
              display:none;
            ">
              <!-- Injected by JS -->
            </div>
          </div>

          <!-- Divider -->
          <div style="width:1px;height:24px;background:var(--color-border);"></div>

          <!-- Notifications -->
          <div style="position:relative;" id="notifications-container">
            <button id="notifications-btn" style="
              position:relative;
              width:36px;height:36px;
              display:flex;align-items:center;justify-content:center;
              border:none;background:none;cursor:pointer;
              border-radius:var(--radius-md);
              color:var(--color-text-secondary);
              transition:all 0.15s;
            "
            onmouseover="this.style.background='var(--color-bg)';this.style.color='var(--color-text-primary)'"
            onmouseout="this.style.background='none';this.style.color='var(--color-text-secondary)'">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              <span id="notifications-badge" style="
                position:absolute;top:6px;right:6px;
                width:8px;height:8px;
                background:var(--color-danger);
                border-radius:50%;
                border:2px solid var(--color-surface);
                display:none;
              "></span>
            </button>
            <div id="notifications-panel" style="
              position:absolute;right:0;top:calc(100% + 8px);
              width:320px;
              background:var(--color-surface);
              border:1px solid var(--color-border);
              border-radius:var(--radius-xl);
              box-shadow:var(--shadow-3);
              z-index:100;
              overflow:hidden;
              display:none;
            ">
              <div style="padding:var(--space-md);border-bottom:1px solid var(--color-border);display:flex;justify-content:space-between;align-items:center;">
                <span style="font-size:var(--text-sm);font-weight:var(--font-semibold);color:var(--color-text-primary);">Notifications</span>
                <button id="mark-all-read-btn" style="font-size:var(--text-xs);color:var(--color-primary);background:none;border:none;cursor:pointer;font-family:var(--font-family);font-weight:var(--font-medium);">Mark all read</button>
              </div>
              <div id="notification-list" style="max-height:280px;overflow-y:auto;padding:var(--space-xs);">
                <!-- Injected by JS -->
              </div>
            </div>
          </div>

          <!-- Global Page Actions slot -->
          <div id="global-page-actions" style="display:flex;align-items:center;gap:var(--space-sm);"></div>

          <!-- Divider -->
          <div style="width:1px;height:24px;background:var(--color-border);"></div>

          <!-- User Avatar + Info -->
          <div style="display:flex;align-items:center;gap:var(--space-sm);padding:4px var(--space-sm);border-radius:var(--radius-full);cursor:pointer;transition:background 0.15s;"
               onmouseover="this.style.background='var(--color-bg)'"
               onmouseout="this.style.background='none'">
            <div id="user-avatar" style="
              width:32px;height:32px;
              background:var(--color-primary);
              color:#fff;
              border-radius:50%;
              display:flex;align-items:center;justify-content:center;
              font-size:var(--text-xs);
              font-weight:var(--font-bold);
              flex-shrink:0;
              letter-spacing:0.02em;
            ">SA</div>
            <div style="display:flex;flex-direction:column;line-height:1.3;">
              <span id="user-name-display" style="font-size:var(--text-sm);font-weight:var(--font-medium);color:var(--color-text-primary);white-space:nowrap;">Super Admin</span>
              <span id="user-role-display" style="font-size:var(--text-xs);color:var(--color-text-muted);white-space:nowrap;">Super Admin</span>
            </div>
          </div>
        </div>
      </header>



      <!-- Page Content Container -->
      <main id="app-content" class="overflow-y-auto pb-12" style="flex:1;height:calc(100vh - var(--topbar-height));background:var(--color-bg);">
        <!-- Content injected by JS -->
      </main>

    </div>
  </div>

  <!-- JavaScript -->
  <script src="js/store.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
